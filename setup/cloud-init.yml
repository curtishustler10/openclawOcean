#cloud-config
# ─────────────────────────────────────────────────────────────────────────────
# AXIS Agent Server — Cloud-Init User Data
#
# Alternative to Packer: paste this into the "User Data" field when creating
# a new DigitalOcean droplet (Ubuntu 22.04). AXIS installs itself on first boot.
#
# After ~5 minutes:
#   SSH in → nano /home/axis/openclawOcean/.env → bash /home/axis/START.sh
# ─────────────────────────────────────────────────────────────────────────────

package_update: true
package_upgrade: true

packages:
  - git
  - curl
  - wget
  - ca-certificates
  - gnupg
  - build-essential
  - ufw
  - chromium-browser
  - libatk1.0-0
  - libatk-bridge2.0-0
  - libcups2
  - libdrm2
  - libgtk-3-0
  - libgbm1
  - libasound2
  - libxss1
  - libxtst6
  - fonts-liberation

users:
  - name: axis
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: sudo

write_files:
  - path: /etc/systemd/system/axis-agent.service
    content: |
      [Unit]
      Description=AXIS Autonomous AI Agent Server
      After=network.target
      Wants=network-online.target

      [Service]
      Type=simple
      User=axis
      WorkingDirectory=/home/axis/openclawOcean/agent
      ExecStart=/usr/bin/node server.js
      Restart=always
      RestartSec=5
      StandardOutput=journal
      StandardError=journal
      SyslogIdentifier=axis-agent
      Environment=NODE_ENV=production
      Environment=WORKSPACE_DIR=/home/axis/openclawOcean
      Environment=PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
      Environment=PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH=/usr/bin/chromium
      EnvironmentFile=/home/axis/openclawOcean/.env

      [Install]
      WantedBy=multi-user.target

runcmd:
  # Node.js 20
  - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
  - apt-get install -y nodejs

  # Claude Code CLI
  - npm install -g @anthropic-ai/claude-code || true

  # Clone repo
  - git clone --branch claude/ai-agent-server-plan-4k5o2 https://github.com/curtishustler10/openclawOcean.git /home/axis/openclawOcean
  - chown -R axis:axis /home/axis/openclawOcean

  # Install agent deps
  - cd /home/axis/openclawOcean/agent && sudo -u axis npm install --omit=dev

  # Install Playwright Chromium
  - cd /home/axis/openclawOcean/agent && PLAYWRIGHT_BROWSERS_PATH=/home/axis/.cache/ms-playwright sudo -u axis -E npx playwright install chromium || true
  - chown -R axis:axis /home/axis/.cache || true

  # .env placeholder
  - cp /home/axis/openclawOcean/.env.example /home/axis/openclawOcean/.env
  - chown axis:axis /home/axis/openclawOcean/.env
  - chmod 600 /home/axis/openclawOcean/.env

  # Create START.sh helper
  - |
    cat > /home/axis/START.sh << 'EOF'
    #!/bin/bash
    ENV_FILE="/home/axis/openclawOcean/.env"
    if grep -q "YOUR_KEY_HERE" "$ENV_FILE"; then
      echo ""; echo "Add your API keys first:"; echo "  nano $ENV_FILE"; exit 1
    fi
    systemctl start axis-agent && sleep 2
    systemctl status axis-agent --no-pager
    echo ""; echo "AXIS running on port 3000"
    echo "Logs: journalctl -u axis-agent -f"
    EOF
  - chmod +x /home/axis/START.sh
  - chown axis:axis /home/axis/START.sh

  # Systemd
  - systemctl daemon-reload
  - systemctl enable axis-agent

  # Firewall
  - ufw allow ssh
  - ufw allow 3000/tcp
  - ufw --force enable

  # Done marker
  - touch /home/axis/.axis-installed
  - echo "AXIS install complete" > /var/log/axis-install.log
